front:
  text: 全眞坐鉢捷法甞觀古人皆按宣洞陽城晷漏且自今年冬至起筭來年冬至日止所謂周天之正數一日一夜通計一百刻毎八刻二十分爲一時惟寅申巳亥有九刻皆以子午定其晝夜今者所在壺漏異常不遵古法務在機巧各肆瞽術工匠一時胷臆之見制度既無軌則時刻宜乎差誤有過與不及之失今輟撰成滴漏循環之法積年而成不勞人力不費工財妙用玄微至簡且捿雖出萬里之外篋笥皆可附行於几案之隅所謂天運璇璣盡在日中矣切見好事君子或用表標或用煙篆然香燥則易爇香潤則燼緩天晴日表可驗隂晦又不可孝三者但非悠久之法但依此造似乎簡易而精通玄微妙中之妙也
  hash: sha256:4dfca3d574f05b1e6693d73c1706769fb5d310e23aae473dee36dff51af8de35

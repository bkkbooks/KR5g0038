body:
  text: 造盂之法其法以銅盂二隻一隻大一隻小大者貯水初無定制但寬大過於小者足矣如無以磁盂代之小者重五兩髙三寸四分面底並闊四寸七分上下四直造之恐度量差殊當以太平錢五十文准其輕重造畢於盂底微鑽一竅如針眼大浮於水盆上令水顛倒自冗外逆通上入小盂中用籌探之水至子時子時至午則午至更則一更矣他皆倣此下漏之法每日天曉日將出時將一小盂浮於大盂水面上至日入時自然水滿小盂沈於水底為度却取出小盂去其水再浮於水面上至來日天曉仍舊沈於水底昏曉二時俱以水滿為度定其晝夜其日停水之時切須澄濾極淨毋使塵滓隘其水冗庶幾水無緩迫之矣造籌之法用薄木竹片皆可為籖箆樣隨尺寸髙下書寫時刻用探水定驗時辰更㸃尤是簡捷凡籌三十四分均布十二段每段該二分五釐惟寅申巳亥上分外加添四分謂維偏添之數也閏餘成歲折蹉之數也今皆捷取一路以浮魚指㸃處是也凡一年十二月止用太平錢二十文隨月加減鎮壓小盂加減之法十一月節晝用二十文太平錢勻鋪小盂底夜用空盂十二月節晝用太平錢十九文夜用一文自十二月節為始晝減一文夜添一文七日一次加減正月節晝用十一文夜用九文二月節晝用十文夜用十文三月節晝用九文夜用十一文三月節為始每七日一次晝減一文夜增一文四月節晝用一文夜用十九文五月節晝用空盂夜用二十文六月節晝用一文夜用十九文自六月節為始每七日一次晝增一文夜減一文七月節晝用九文夜用一十一文八月節晝夜各用十文九月節晝用十一文夜用九文自九月節為始每七日一次晝添一文夜減一文十月節晝用十一文夜用九文定太陽出沒法正九出乙入庚方二八出兔入雞場三七發甲入辛地四六生寅入犬藏五月生艮歸乾上仲冬出巽入坤方惟有十月十二月出辰入申仔細詳九陽真人全真坐鉢捷法終
